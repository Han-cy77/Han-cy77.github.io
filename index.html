<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome!</title>
    <link rel="icon" href="site.ico" type="image/x-icon">
    <link rel="shortcut icon" href="site.ico" type="image/x-icon">
    <style>
        /* 重置与基础 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Georgia, 'Times New Roman', serif;
            background-color: #f5f4ed;
            color: #141413;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            overflow-x: hidden;
        }

        /* 极简音乐播放器 - 固定在左上角 */
        .music-player {
            position: fixed;
            left: 2rem;
            top: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            z-index: 100;
        }

        /* 唱片封面容器 */
        .album-cover {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: rgba(0,0,0,0.15) 0px 4px 16px;
            border: 4px solid #e8e6dc;
            position: relative;
            overflow: hidden;
            background-color: #30302e;
        }

        /* 唱片封面图片 */
        .album-cover .cover-image {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            animation: rotate 8s linear infinite;
            animation-play-state: paused;
        }

        .album-cover.playing .cover-image {
            animation-play-state: running;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 播放控制按钮 */
        .play-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: #c96442;
            border: none;
            cursor: pointer;
            position: relative;
            box-shadow: 0px 0px 0px 1px #c96442, 0px 4px 12px rgba(201, 100, 66, 0.3);
            transition: all 0.2s ease;
        }

        .play-btn:hover {
            background-color: #b85a3a;
            transform: scale(1.05);
        }

        .play-btn:active {
            transform: scale(0.98);
        }

        /* 播放按钮中的播放/暂停图标 */
        .play-icon, .pause-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            transition: opacity 0.15s ease;
            line-height: 0;
            margin: 0;
            padding: 0;
            display: flex;
        }

        .play-icon svg, .pause-icon svg {
            width: 18px;
            height: 18px;
            fill: #faf9f5;
        }

        .play-icon { opacity: 1; }
        .pause-icon { opacity: 0; }

        .play-btn.playing .play-icon { opacity: 0; }
        .play-btn.playing .pause-icon { opacity: 1; }

        /* 歌曲信息 - 隐藏 */
        .song-info {
            display: none;
        }

        /* 主容器 */
        .container {
            background-color: #faf9f5;
            padding: 3.5rem 4rem;
            border-radius: 32px;
            text-align: center;
            max-width: 680px;
            width: 100%;
            box-shadow: rgba(0,0,0,0.05) 0px 4px 24px;
            border: 1px solid #f0eee6;
        }

        /* 标题样式 - Anthropic Serif 风格 */
        h1 {
            font-size: 2.8rem;
            font-weight: 500;
            line-height: 1.20;
            margin-bottom: 1.5rem;
            color: #141413;
            letter-spacing: -0.02em;
        }

        /* 欢迎动图样式 */
        .welcome-gif {
            max-width: 200px;
            height: auto;
            margin-bottom: 1.5rem;
            border-radius: 12px;
        }

        /* 副标题 */
        .subtitle {
            font-size: 1.15rem;
            color: #5e5d59;
            line-height: 1.60;
            margin-bottom: 0.75rem;
        }

        .subtitle:last-of-type {
            margin-bottom: 2rem;
        }

        /* 按钮容器 */
        .links {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-top: 1rem;
        }

        /* 主要 CTA 按钮 - Terracotta 品牌色 */
        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background-color: #c96442;
            color: #faf9f5;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.2s ease;
            box-shadow: 0px 0px 0px 1px #c96442;
        }

        .btn-primary:hover {
            background-color: #b85a3a;
            transform: translateY(-1px);
        }

        /* 次要按钮 - Warm Sand */
        .btn-secondary {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background-color: #e8e6dc;
            color: #4d4c48;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.2s ease;
            box-shadow: 0px 0px 0px 1px #d1cfc5;
        }

        .btn-secondary:hover {
            background-color: #ddd9cc;
            box-shadow: 0px 0px 0px 1px #c2c0b6;
        }

        /* 图标样式 */
        .icon {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }

        /* 装饰性元素 */
        .decoration {
            position: fixed;
            opacity: 0.15;
            pointer-events: none;
        }

        .decoration-1 {
            top: 10%;
            left: 5%;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, #c96442 0%, transparent 70%);
            border-radius: 50%;
        }

        .decoration-2 {
            bottom: 15%;
            right: 8%;
            width: 150px;
            height: 150px;
            background: radial-gradient(circle, #5e5d59 0%, transparent 70%);
            border-radius: 50%;
        }

        /* 响应式设计 */
        @media (max-width: 640px) {
            body {
                padding: 1rem;
            }

            /* 移动端隐藏左侧播放器，调整内容区域 */
            .music-player {
                display: none;
            }

            .container {
                padding: 2.5rem 1.5rem;
                border-radius: 24px;
            }

            h1 {
                font-size: 2rem;
            }

            .subtitle {
                font-size: 1rem;
            }

            .links {
                flex-direction: column;
                align-items: center;
            }

            .btn-primary,
            .btn-secondary {
                width: 100%;
                max-width: 280px;
                justify-content: center;
            }
        }

        /* 平板适配 - 缩小左侧播放器 */
        @media (max-width: 900px) and (min-width: 641px) {
            .music-player {
                left: 1rem;
                top: 1.5rem;
            }

            .album-cover {
                width: 60px;
                height: 60px;
            }

            .play-btn {
                width: 36px;
                height: 36px;
            }

            .play-icon svg, .pause-icon svg {
                width: 16px;
                height: 16px;
            }
        }
    </style>
</head>
<body>
    <!-- 装饰元素 -->
    <div class="decoration decoration-1"></div>
    <div class="decoration decoration-2"></div>

    <!-- 极简音乐播放器 - 固定在左上角 -->
    <div class="music-player">
        <div class="album-cover" id="albumCover">
            <img src="cover.jfif" alt="Album Cover" class="cover-image">
        </div>
        
        <button class="play-btn" id="playBtn" aria-label="播放/暂停">
            <div class="play-icon">
                <svg viewBox="0 0 24 24">

            </div>
            <div class="pause-icon">
                <svg viewBox="0 0 24 24">
                    <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
                </svg>
            </div>
        </button>
    </div>

    <!-- 主内容区域 - 保持居中 -->
    <div class="container">
        <img src="welcome.gif" alt="Welcome" class="welcome-gif">
        <h1>Hello! Welcome.</h1>
        <p class="subtitle">This is the personal homepage for Chaoyu Han</p>

                </svg>
                AI
            </a>

            <!-- 工具网站按钮 -->
            <a href="https://tools.sillylee.space/" class="btn-primary" target="_blank">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path>
                </svg>

            <a href="https://github.com/Han-cy77" class="btn-secondary" target="_blank">

            <a href="https://blog.sillylee.space" class="btn-secondary" target="_blank">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M19 20H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v1m2 13a2 2 0 0 1-2-2V7m2 13a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z"></path>

                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 18V5l12-2v13"></path>

                Music

        </div>
    </div>

    <!-- 隐藏的音频元素 -->
    <audio id="audioPlayer" src="music.flac"></audio>

    <script>
        const playBtn = document.getElementById('playBtn');
        const albumCover = document.getElementById('albumCover');
        const audioPlayer = document.getElementById('audioPlayer');

        playBtn.addEventListener('click', () => {
            if (audioPlayer.paused) {
                audioPlayer.play();
                playBtn.classList.add('playing');
                albumCover.classList.add('playing');
            } else {
                audioPlayer.pause();
                playBtn.classList.remove('playing');
                albumCover.classList.remove('playing');
            }
        });

        // 音频播放结束时的处理
        audioPlayer.addEventListener('ended', () => {
            playBtn.classList.remove('playing');
            albumCover.classList.remove('playing');
        });

        // 处理音频加载错误
        audioPlayer.addEventListener('error', () => {
            console.log('音频文件加载失败，请确保 music.flac 文件存在');
        });
    </script>
</body>
</html>
