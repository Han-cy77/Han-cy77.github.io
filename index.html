<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome!</title>
    <link rel="icon" href="site.ico" type="image/x-icon">
    <link rel="shortcut icon" href="site.ico" type="image/x-icon">
    <style>
        /* 重置与基础 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Georgia, 'Times New Roman', serif;
            background-color: #f5f4ed;
            color: #141413;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            overflow-x: hidden;
        }

        /* 主容器 */
        .container {
            background-color: #faf9f5;
            padding: 3.5rem 4rem;
            border-radius: 32px;
            text-align: center;
            max-width: 680px;
            width: 100%;
            box-shadow: rgba(0,0,0,0.05) 0px 4px 24px;
            border: 1px solid #f0eee6;
        }

        /* 标题样式 - Anthropic Serif 风格 */
        h1 {
            font-size: 2.8rem;
            font-weight: 500;
            line-height: 1.20;
            margin-bottom: 1.5rem;
            color: #141413;
            letter-spacing: -0.02em;
        }

        /* 欢迎动图样式 */
        .welcome-gif {
            max-width: 200px;
            height: auto;
            margin-bottom: 1.5rem;
            border-radius: 12px;
        }

        /* 副标题 */
        .subtitle {
            font-size: 1.15rem;
            color: #5e5d59;
            line-height: 1.60;
            margin-bottom: 0.75rem;
        }

        .subtitle:last-of-type {
            margin-bottom: 2rem;
        }

        /* 按钮容器 */
        .links {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-top: 1rem;
        }

        /* 主要 CTA 按钮 - Terracotta 品牌色 */
        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background-color: #c96442;
            color: #faf9f5;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.2s ease;
            box-shadow: 0px 0px 0px 1px #c96442;
        }

        .btn-primary:hover {
            background-color: #b85a3a;
            transform: translateY(-1px);
        }

        /* 次要按钮 - Warm Sand */
        .btn-secondary {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background-color: #e8e6dc;
            color: #4d4c48;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.2s ease;
            box-shadow: 0px 0px 0px 1px #d1cfc5;
        }

        .btn-secondary:hover {
            background-color: #ddd9cc;
            box-shadow: 0px 0px 0px 1px #c2c0b6;
        }

        /* 图标样式 */
        .icon {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }

        /* 页脚 */
        .footer {
            margin-top: 3rem;
            text-align: center;
        }

        .footer a {
            color: #87867f;
            text-decoration: none;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 0.88rem;
            transition: color 0.2s ease;
        }

        .footer a:hover {
            color: #5e5d59;
        }

        /* 备案图标 */
        .beian-icon {
            width: auto;
            height: 23px;
            vertical-align: middle;
            margin-right: 4px;
        }

        /* 装饰性元素 */
        .decoration {
            position: fixed;
            opacity: 0.15;
            pointer-events: none;
        }

        .decoration-1 {
            top: 10%;
            left: 5%;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, #c96442 0%, transparent 70%);
            border-radius: 50%;
        }

        .decoration-2 {
            bottom: 15%;
            right: 8%;
            width: 150px;
            height: 150px;
            background: radial-gradient(circle, #5e5d59 0%, transparent 70%);
            border-radius: 50%;
        }

        /* 响应式设计 */
        @media (max-width: 640px) {
            .container {
                padding: 2.5rem 1.5rem;
                border-radius: 24px;
            }

            h1 {
                font-size: 2rem;
            }

            .subtitle {
                font-size: 1rem;
            }

            .links {
                flex-direction: column;
                align-items: center;
            }

            .btn-primary,
            .btn-secondary {
                width: 100%;
                max-width: 280px;
                justify-content: center;
            }
        }
    </style>
</head>
